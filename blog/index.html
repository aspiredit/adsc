<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Autism Dads Social Club</title>
<meta name="description" content="Stories, resources, and reflections from the Autism Dads Social Club brotherhood in Houston.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --blue-deep: #1F5E96;
    --blue-mid: #4FA0D8;
    --blue-soft: #8FBCDB;
    --gold-soft: #B8843D;
    --bg: #F8FAFC;
    --bg-warm: #E8F0F8;
    --bg-card: #FFFFFF;
    --ink: #1A2533;
    --ink-soft: #38475A;
    --ink-mute: #5A6B7C;
    --line: #D8E4ED;
    --line-soft: #E8EFF5;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scroll-padding-top: 92px; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--ink); line-height: 1.55; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 28px; }

  header.page-header {
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.92);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    backdrop-filter: saturate(180%) blur(12px);
    padding: 16px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .page-header-inner { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
  .page-header-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--blue-deep); }
  .page-header-brand:hover { text-decoration: none; }
  .page-header-logo {
    width: 44px; height: 44px;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(31,94,150,0.15));
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.35rem;
    color: var(--blue-deep);
    line-height: 1.2;
  }
  .home-link {
    font-family: var(--font-body); font-size: 0.95rem;
    color: var(--ink-mute); text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all 0.15s ease;
  }
  .home-link:hover { color: var(--blue-deep); border-bottom-color: var(--blue-soft); }

  main { padding: 60px 0 100px; }
  .page-intro {
    text-align: center;
    max-width: 620px;
    margin: 0 auto 50px;
    color: var(--ink-soft);
    font-size: 1.05rem;
  }
  .page-intro h2 {
    font-family: var(--font-display);
    font-size: clamp(1.9rem, 3.4vw, 2.6rem);
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    line-height: 1.2;
  }

  #blog-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }
  .blog-empty { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--ink-mute); font-style: italic; }

  .blog-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .blog-card:hover { transform: translateY(-3px); box-shadow: 0 14px 32px -12px rgba(31,94,150,0.18); border-color: var(--blue-soft); }
  .blog-card-cover { display: block; aspect-ratio: 16 / 10; overflow: hidden; background: var(--blue-deep); }
  .blog-card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
  .blog-card:hover .blog-card-cover img { transform: scale(1.04); }
  .blog-card-body { padding: 24px 24px 26px; display: flex; flex-direction: column; flex-grow: 1; }
  .blog-card-meta { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-mute); font-weight: 600; margin-bottom: 12px; }
  .blog-card-author { text-transform: none; letter-spacing: 0; font-weight: 500; }
  .blog-card-title { font-family: var(--font-display); font-size: 1.32rem; font-weight: 500; line-height: 1.22; margin-bottom: 12px; }
  .blog-card-title a { color: var(--ink); text-decoration: none; transition: color 0.15s ease; }
  .blog-card-title a:hover { color: var(--blue-deep); }
  .blog-card-excerpt { font-size: 0.96rem; color: var(--ink-soft); line-height: 1.55; margin-bottom: 18px; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .blog-card-readmore { margin-top: auto; color: var(--blue-deep); font-weight: 600; font-size: 0.93rem; text-decoration: none; }
  .blog-card-readmore:hover { text-decoration: underline; }

  @media (max-width: 760px) {
    #blog-list { grid-template-columns: 1fr; max-width: 560px; margin: 0 auto; }
  }

  footer { border-top: 1px solid var(--line); background: #fff; padding: 24px 0; color: var(--ink-mute); font-size: 0.85rem; text-align: center; }
</style>
</head>
<body>

<header class="page-header">
  <div class="container page-header-inner">
    <a href="../" class="page-header-brand" aria-label="Autism Dads Social Club — home">
      <img class="page-header-logo" src="../assets/logo.png" alt="">
      <h1>Blog</h1>
    </a>
    <a href="../" class="home-link">← Back to home</a>
  </div>
</header>

<main>
  <div class="container">
    <div class="page-intro">
      <h2>Stories from the brotherhood.</h2>
      <p>Reflections, resources, and lessons from dads building this club, raising autistic kids, and figuring it out together.</p>
    </div>
    <div id="blog-list"></div>
  </div>
</main>

<footer>
  <div class="container">© 2026 Autism Dads Social Club · Houston, TX</div>
</footer>

<script type="module">
  import { init } from "../js/blogs.js";
  init();
</script>

</body>
</html>
