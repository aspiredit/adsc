<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Events — Autism Dads Social Club</title>
<meta name="description" content="A look back at past meetups, family events, and gatherings from the Autism Dads Social Club Houston brotherhood.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --blue-deep: #1F5E96;
    --blue-mid: #4FA0D8;
    --blue-soft: #8FBCDB;
    --blue-pale: #C4DEED;
    --gold-soft: #B8843D;
    --bg: #F8FAFC;
    --bg-warm: #E8F0F8;
    --ink: #1A2533;
    --ink-mute: #5A6B7C;
    --line: #D8E4ED;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 28px; }

  header.page-header {
    border-bottom: 1px solid var(--line);
    background: #fff;
    padding: 28px 0;
  }
  .page-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.6rem;
    color: var(--blue-deep);
  }
  .home-link {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--ink-mute);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all 0.15s ease;
  }
  .home-link:hover { color: var(--blue-deep); border-bottom-color: var(--blue-soft); }

  main {
    padding: 60px 0 100px;
  }
  .archive-intro {
    text-align: center;
    max-width: 600px;
    margin: 0 auto 50px;
    color: var(--ink-mute);
  }

  #archive-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
  }
  .archive-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-mute);
    font-style: italic;
  }

  .archive-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    opacity: 0.92;
    transition: opacity 0.15s ease;
  }
  .archive-card:hover { opacity: 1; }

  .archive-card-flyer {
    aspect-ratio: 1 / 1;
    width: 100%;
    background: var(--blue-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .archive-card-flyer .rsvp-featured-flyer-img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    filter: saturate(0.85);
  }
  .archive-card-flyer .flyer-fallback {
    width: 100%;
    height: 100%;
    padding: 24px;
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    text-align: left;
    box-sizing: border-box;
  }
  .archive-card-flyer .flyer-type-pill {
    display: inline-block;
    padding: 5px 11px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
  }
  .archive-card-flyer .flyer-fallback-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1.15;
    color: #fff;
  }
  .archive-card-body {
    padding: 18px 20px 22px;
  }
  .archive-past-badge {
    display: inline-block;
    padding: 3px 9px;
    background: var(--line);
    color: var(--ink-mute);
    border-radius: 999px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 10px;
  }
  .archive-card-title {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--blue-deep);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .archive-card-date {
    font-size: 0.88rem;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .archive-card-location {
    font-size: 0.85rem;
    color: var(--ink-mute);
  }

  footer {
    border-top: 1px solid var(--line);
    background: #fff;
    padding: 24px 0;
    color: var(--ink-mute);
    font-size: 0.85rem;
    text-align: center;
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="container page-header-inner">
    <h1>Past Events</h1>
    <a href="../" class="home-link">← Back to home</a>
  </div>
</header>

<main>
  <div class="container">
    <p class="archive-intro">A look back. Every meetup, family day, and gathering since the club started.</p>
    <div id="archive-grid"></div>
  </div>
</main>

<footer>
  <div class="container">© 2026 Autism Dads Social Club · Houston, TX</div>
</footer>

<script type="module">
  import { filterDrafts, isPreviewMode, showPreviewBanner } from "../js/events.js";
  import { pickPastEvents, renderArchive } from "../js/archive.js";

  async function init() {
    const previewMode = isPreviewMode(window.location.search);
    if (previewMode) showPreviewBanner();
    try {
      const res = await fetch("../_data/events.json");
      if (!res.ok) throw new Error(`Failed to load events: ${res.status}`);
      const events = filterDrafts(await res.json(), previewMode);
      renderArchive(pickPastEvents(events));
    } catch (err) {
      console.error("Could not load events:", err);
      renderArchive([]);
    }
  }

  init();
</script>

</body>
</html>
