name: Build content manifests

# Regenerates docs/_data/{blogs,photos}.json whenever a CMS edit lands in
# docs/_data/{blogs,photos}/**. The browser fetches these manifests; the
# script discovers files since the browser can't list a directory.
# See: issues/011-content-manifests.md

on:
  push:
    branches: [main]
    paths:
      - 'docs/_data/blogs/**'
      - 'docs/_data/photos/**'
      - 'scripts/build_manifests.py'
      - '.github/workflows/build-manifests.yml'
  workflow_dispatch: {}

# Prevent infinite loop: the action commits a manifest back to main, which
# would re-trigger itself. Guarded by the actor check below.
concurrency:
  group: build-manifests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Skip when the commit was made by this very workflow (the bot commit
    # author). Otherwise the commit-back step would loop forever.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write token so we can push the manifest commit back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build manifests
        run: python scripts/build_manifests.py

      - name: Commit manifest changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/_data/blogs.json docs/_data/photos.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "chore(manifests): rebuild blogs.json + photos.json"
          git push
