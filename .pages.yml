# Pages CMS configuration — see https://pagescms.org/docs/configuration

media:
  input: assets/images
  output: /assets/images

content:
  # ── EVENTS ──────────────────────────────────────────
  - name: events
    label: Events
    path: _data/events.json
    type: file
    format: json
    fields:
      - name: events
        label: Events
        type: object
        list: true
        fields:
          - name: id
            label: ID (slug, e.g. 2026-06-13-slick-willies)
            type: string
            required: true
          - name: title
            label: Title
            type: string
            required: true
          - name: type
            label: Type
            type: select
            options:
              values:
                - { value: meetup,       label: "Dads-only meetup" }
                - { value: family_event, label: "Family event (bring kids)" }
                - { value: fundraiser,   label: "Fundraiser" }
                - { value: other,        label: "Other" }
            default: meetup
            required: true
          # Date and time are SEPARATE fields. The site combines them into a
          # Central-Time instant at load — so an editor never has to type a
          # timezone, and a stray time range can't land in the date box.
          - name: date
            label: Date
            type: date
            required: true
            options:
              format: yyyy-MM-dd
          - name: start_time
            label: Start time (Central)
            type: select
            required: true
            options:
              values:
              - { value: "07:00", label: "7:00 AM" }
              - { value: "07:30", label: "7:30 AM" }
              - { value: "08:00", label: "8:00 AM" }
              - { value: "08:30", label: "8:30 AM" }
              - { value: "09:00", label: "9:00 AM" }
              - { value: "09:30", label: "9:30 AM" }
              - { value: "10:00", label: "10:00 AM" }
              - { value: "10:30", label: "10:30 AM" }
              - { value: "11:00", label: "11:00 AM" }
              - { value: "11:30", label: "11:30 AM" }
              - { value: "12:00", label: "12:00 PM" }
              - { value: "12:30", label: "12:30 PM" }
              - { value: "13:00", label: "1:00 PM" }
              - { value: "13:30", label: "1:30 PM" }
              - { value: "14:00", label: "2:00 PM" }
              - { value: "14:30", label: "2:30 PM" }
              - { value: "15:00", label: "3:00 PM" }
              - { value: "15:30", label: "3:30 PM" }
              - { value: "16:00", label: "4:00 PM" }
              - { value: "16:30", label: "4:30 PM" }
              - { value: "17:00", label: "5:00 PM" }
              - { value: "17:30", label: "5:30 PM" }
              - { value: "18:00", label: "6:00 PM" }
              - { value: "18:30", label: "6:30 PM" }
              - { value: "19:00", label: "7:00 PM" }
              - { value: "19:30", label: "7:30 PM" }
              - { value: "20:00", label: "8:00 PM" }
              - { value: "20:30", label: "8:30 PM" }
              - { value: "21:00", label: "9:00 PM" }
              - { value: "21:30", label: "9:30 PM" }
              - { value: "22:00", label: "10:00 PM" }
              - { value: "22:30", label: "10:30 PM" }
          - name: end_time
            label: End time (Central, optional)
            type: select
            options:
              values:
              - { value: "07:00", label: "7:00 AM" }
              - { value: "07:30", label: "7:30 AM" }
              - { value: "08:00", label: "8:00 AM" }
              - { value: "08:30", label: "8:30 AM" }
              - { value: "09:00", label: "9:00 AM" }
              - { value: "09:30", label: "9:30 AM" }
              - { value: "10:00", label: "10:00 AM" }
              - { value: "10:30", label: "10:30 AM" }
              - { value: "11:00", label: "11:00 AM" }
              - { value: "11:30", label: "11:30 AM" }
              - { value: "12:00", label: "12:00 PM" }
              - { value: "12:30", label: "12:30 PM" }
              - { value: "13:00", label: "1:00 PM" }
              - { value: "13:30", label: "1:30 PM" }
              - { value: "14:00", label: "2:00 PM" }
              - { value: "14:30", label: "2:30 PM" }
              - { value: "15:00", label: "3:00 PM" }
              - { value: "15:30", label: "3:30 PM" }
              - { value: "16:00", label: "4:00 PM" }
              - { value: "16:30", label: "4:30 PM" }
              - { value: "17:00", label: "5:00 PM" }
              - { value: "17:30", label: "5:30 PM" }
              - { value: "18:00", label: "6:00 PM" }
              - { value: "18:30", label: "6:30 PM" }
              - { value: "19:00", label: "7:00 PM" }
              - { value: "19:30", label: "7:30 PM" }
              - { value: "20:00", label: "8:00 PM" }
              - { value: "20:30", label: "8:30 PM" }
              - { value: "21:00", label: "9:00 PM" }
              - { value: "21:30", label: "9:30 PM" }
              - { value: "22:00", label: "10:00 PM" }
              - { value: "22:30", label: "10:30 PM" }
          - name: location
            label: Location
            type: string
            required: true
          - name: description
            label: Description
            type: text
          - name: flyer
            label: Flyer (Canva PNG, 1080×1080 square, max 2 MB)
            type: image
          - name: rsvp_url
            label: External RSVP link (optional)
            type: string
          - name: cta_label
            label: Button text (optional)
            type: string
          - name: status
            label: Status
            type: select
            options:
              values:
                - { value: scheduled, label: "Scheduled" }
                - { value: cancelled, label: "Cancelled (show banner)" }
                - { value: postponed, label: "Postponed (show banner)" }
            default: scheduled
            required: true
          - name: draft
            label: Save as draft (hidden from public site until unchecked)
            type: boolean
            default: false

  # ── SAVE-THE-DATE FLIERS ────────────────────────────
  # Standalone fliers (post a flier before an event has full details). Event
  # flyers ALSO appear in the same "Save the date" section automatically.
  - name: fliers
    label: Save-the-Date Fliers
    path: _data/fliers.json
    type: file
    format: json
    fields:
      - name: fliers
        label: Fliers
        type: object
        list: true
        fields:
          - name: image
            label: Flier image
            type: image
            required: true
          - name: caption
            label: Caption (event name)
            type: string
          - name: date
            label: Event date (optional — hides the flier once it passes)
            type: date
            options:
              format: yyyy-MM-dd
          - name: link
            label: Link (optional — RSVP or details URL)
            type: string

  # ── BLOG POSTS ──────────────────────────────────────
  - name: blogs
    label: Blog Posts
    path: _data/blogs             # ← correct path ✅
    type: collection
    fields:
      - { name: title,            label: Title,            type: string }
      - { name: date,             label: Publish Date,     type: date }
      - { name: author,           label: Author Name,      type: string }
      - { name: author_initials,  label: Author Initials,  type: string }
      - { name: cover_image,      label: Cover Image,      type: image }
      - { name: excerpt,          label: Excerpt / Intro,  type: text }
      - { name: body,             label: Content,          type: rich-text }
      - { name: meta_description, label: Meta Description, type: text }
      - { name: meta_image,       label: Meta/OG Image,    type: image }
      - { name: meta_keywords,    label: Meta Keywords,    type: string }
      - name: draft
        label: Save as draft
        type: boolean
        default: false

  # ── PHOTOS ──────────────────────────────────────────
  - name: photos
    label: Photos
    path: _data/photos            # ← correct path ✅
    type: collection
    fields:
      - { name: title,   label: Title,   type: string }
      - { name: image,   label: Photo,   type: image }
      - { name: caption, label: Caption, type: string }
